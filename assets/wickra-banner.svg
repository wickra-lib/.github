    <rect x="876" y="446" width="22" height="78" rx="5"/><rect x="884" y="428" width="6" height="116" rx="3"/>
    <rect x="940" y="402" width="22" height="96" rx="5"/><rect x="948" y="384" width="6" height="134" rx="3"/>
    <rect x="1004" y="350" width="22" height="116" rx="5"/><rect x="1012" y="330" width="6" height="158" rx="3"/>
    <rect x="1068" y="296" width="22" height="138" rx="5"/><rect x="1076" y="276" width="6" height="180" rx="3"/>
