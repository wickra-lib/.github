      <stop offset="0" stop-color="#fff1c4"/>
      <stop offset="0.3" stop-color="#f8cf63"/>
      <stop offset="0.62" stop-color="#e3a52f"/>
      <stop offset="1" stop-color="#9c6510"/>
    </linearGradient>
    <radialGradient id="bg" cx="0.24" cy="0.18" r="1.1">
