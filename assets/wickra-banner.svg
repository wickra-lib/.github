  <!-- mark -->
  <svg x="84" y="132" width="300" height="300" viewBox="-3 -3 106 106">
    <polygon points="27.5,8 72.5,8 95,50 72.5,92 27.5,92 5,50" fill="#0e1219" stroke="url(#gold)" stroke-width="3.8" stroke-linejoin="round"/>
    <polygon points="33,20 67,20 84,50 67,80 33,80 16,50" fill="none" stroke="url(#gold)" stroke-width="1.1" opacity="0.45"/>
    <rect x="47.7" y="24" width="4.6" height="52" rx="2.3" fill="#f4f0e2"/>
    <rect x="42.5" y="41" width="15" height="23" rx="4.5" fill="url(#gold)"/>
    <rect x="44.5" y="43.5" width="11" height="5" rx="2.5" fill="#ffffff" opacity="0.32"/>
  </svg>

  <!-- wordmark -->
  <text x="448" y="260" font-size="138" font-weight="700" letter-spacing="-6"><tspan fill="#f7f3ea">wick</tspan><tspan fill="url(#gold)">ra</tspan></text>
  <rect x="454" y="300" width="44" height="7" rx="3.5" fill="#f8cf63"/>
  <text x="514" y="312" font-size="28" letter-spacing="1.5" fill="#f6f9fc">streaming-first technical indicators</text>
  <text x="454" y="360" font-size="23" letter-spacing="1" fill="#e0e6ed">Native · Rust core · Python · Node.js · WASM</text>
  <text x="454" y="402" font-size="21" letter-spacing="1" fill="#ccd5df">C ABI hub → C, C++ · C# · Go · Java · R</text>

  <text x="1200" y="528" font-size="23" letter-spacing="1" fill="#b8c1cc" text-anchor="end">10 languages · <tspan fill="#f7f3ea">0 dependencies</tspan></text>
  <line x1="80" y1="556" x2="1200" y2="556" stroke="#222a36" stroke-width="2"/>
  <text x="80" y="592" font-size="23" letter-spacing="1" fill="#b8c1cc">wickra.org</text>
  <text x="1200" y="592" font-size="23" letter-spacing="1" fill="#b8c1cc" text-anchor="end">514 indicators · O(1) per tick</text>
