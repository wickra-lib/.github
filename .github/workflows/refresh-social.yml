name: Refresh social badges

# Snapshots the community/social badges — GitHub stars, forks, issues — and the
# star-history chart into profile/badges/ so the main wickra README serves them
# from this repo instead of hot-linking shields.io / star-history (which showed
# shields' "token from pool" error live and froze the chart behind GitHub Camo).
# Runs hourly and commits only when a snapshot actually changed, plus on demand
# and on any change to the generator so a fresh setup populates immediately.
# Sibling of refresh-badges.yml; staggered minute + own concurrency group, and
# rebases before pushing so the two badge workflows never clash. See
# scripts/fetch-social.mjs.
on:
  schedule:
    - cron: '37 * * * *' # hourly at :37 (offset from refresh-badges at :17)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/fetch-social.mjs
      - .github/workflows/refresh-social.yml

permissions:
  contents: write

concurrency:
  group: refresh-social
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Don't persist the token in .git/config (zizmor: artipacked); the push
          # step below authenticates explicitly with an ephemeral token URL.
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Fetch social badge snapshots
        run: node scripts/fetch-social.mjs

      - name: Commit if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain profile/badges)" ]; then
            echo "social badges unchanged; nothing to commit"
            exit 0
          fi
          git config user.name "wickra-bot"
          git config user.email "wickra-bot@users.noreply.github.com"
          git add profile/badges
          git commit -m "chore: refresh social badge snapshots"
          # refresh-badges.yml writes the same directory; rebase onto anything it
          # pushed in the meantime so the two badge workflows never clash on push.
          git pull --rebase "https://github.com/${GITHUB_REPOSITORY}.git" main
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
