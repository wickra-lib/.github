name: Refresh status badges

# Snapshots the repo-status badge SVGs into profile/badges/ so the org profile
# README and the main wickra README both serve them from this repo (like the
# banner) instead of hot-linking shields.io / codecov / … at page load. Runs
# hourly and commits only when a badge actually changed, plus on demand and on
# any change to the generator so a fresh setup populates immediately. See
# scripts/fetch-badges.mjs.
on:
  schedule:
    - cron: '17 * * * *' # hourly at :17
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/fetch-badges.mjs
      - .github/workflows/refresh-badges.yml

permissions:
  contents: write

concurrency:
  group: refresh-badges
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Don't persist the token in .git/config (zizmor: artipacked); the push
          # step below authenticates explicitly with an ephemeral token URL.
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Fetch badge snapshots
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-badges.mjs

      - name: Commit if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain profile/badges)" ]; then
            echo "badges unchanged; nothing to commit"
            exit 0
          fi
          git config user.name "wickra-bot"
          git config user.email "wickra-bot@users.noreply.github.com"
          git add profile/badges
          git commit -m "chore: refresh status badge snapshots"
          # refresh-social.yml writes the same directory; rebase onto anything it
          # pushed in the meantime so the two badge workflows never clash on push.
          git pull --rebase "https://github.com/${GITHUB_REPOSITORY}.git" main
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
