name: Regenerate profile banner

# Keeps profile/wickra-banner.webp (shown at the top of the org profile) in sync
# with the indicator count. The count is written into profile/README.md by the
# wickra repo's sync-about.yml (via a PAT push, which DOES trigger this run);
# this job re-renders the banner from the SVG and commits it back. The commit
# uses GITHUB_TOKEN, whose pushes do NOT trigger workflows, so there is no loop.
on:
  push:
    branches: [main]
    paths:
      - profile/README.md
      - assets/wickra-banner.svg
      - scripts/gen-banner.mjs
      - package.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  banner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run gen:banner

      - name: Commit the refreshed banner if it changed
        run: |
          if git diff --quiet -- profile/wickra-banner.webp assets/wickra-banner.svg; then
            echo "Banner already up to date — nothing to commit."
            exit 0
          fi
          git config user.name "wickra-bot"
          git config user.email "wickra-bot@users.noreply.github.com"
          git add profile/wickra-banner.webp assets/wickra-banner.svg
          git commit -m "chore: regenerate profile banner from current indicator count"
          git push
